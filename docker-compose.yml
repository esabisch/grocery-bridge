# Deploy notes (Synology NAS DS224+ / Container Manager):
#
# 1. Copy this repo to /volume1/docker/grocery-bridge on the NAS.
# 2. Create /volume1/docker/grocery-bridge/.env from .env.example, fill in the
#    Todoist token.
# 3. From SSH on the NAS:
#       cd /volume1/docker/grocery-bridge
#       sudo docker compose up -d --build
# 4. One-time Walmart login: run on your laptop with headless=False to populate
#    the persistent profile, then rsync ./data/browser_profile/ to the NAS:
#       python -m scripts.walmart_login
#       rsync -av ./data/browser_profile/ \
#           eric@<nas>:/volume1/docker/grocery-bridge/data/browser_profile/
# 5. Add a published hostname to the existing cloudflared tunnel:
#       grocery.sabisch.dev  ->  http://<nas-ip>:8765
#    (Cloudflare Zero Trust dashboard -> Networks -> Tunnels -> your tunnel ->
#     Public Hostname -> Add)
# 6. Cloudflare Access -> Applications -> Add self-hosted app for
#    grocery.sabisch.dev with email allowlist (esabisch@fni-stl.com).

services:
  grocery-bridge:
    build: .
    image: grocery-bridge:latest
    container_name: grocery-bridge
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Bind only on loopback / LAN -- public access is via cloudflared, not this port.
      - "8765:8000"
    volumes:
      - ./data:/app/data
    # Synology DS224+ has 2-6 GB RAM; cap Chromium so it can't gobble it all.
    mem_limit: 1g
    mem_reservation: 512m
    # Chromium needs a larger /dev/shm than the default 64MB.
    shm_size: 1gb
